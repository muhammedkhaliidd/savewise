<div class="grid gap-4">
    <div>
      <label for="type" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)] mb-1">
        <i class="pi pi-tag text-[var(--color-primary)] !text-xs"></i>
        Type <span class="text-red-500">*</span>
      </label>
      <p-selectButton
        id="type"
        [options]="typeOptions"
        [ngModel]="type()"
        optionLabel="label"
        optionValue="value"
        (onChange)="type.set($event.value)"
        ariaLabelledBy="savings-type"
      >
        <ng-template let-option pTemplate="item">
          <span class="inline-flex items-center gap-2">
            <i [class]="option.icon"></i>
            {{ option.label }}
          </span>
        </ng-template>
      </p-selectButton>
    </div>

    <div>
      <label for="label" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)] mb-1">
        <i class="pi pi-id-card text-[var(--color-primary)] !text-xs"></i>
        Name of the savings <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        id="label"
        [(ngModel)]="labelValue"
        placeholder="e.g., Emergency fund"
        class="w-full"
      />
    </div>

    @if (type() === 'money') {
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-4">
      <div>
        <label for="currency" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)] mb-1">
          <i class="pi pi-dollar text-[var(--color-primary)] !text-xs"></i>
          Currency <span class="text-red-500">*</span>
        </label>
        <app-currency-select
          id="currency"
          [currencies]="allCurrencies()"
          [selectedCode]="currency()"
          (selectionChange)="currency.set($event)"
        />
      </div>

      <div>
        <label for="amount" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)] mb-1">
          <i class="pi pi-money-bill text-[var(--color-primary)] !text-xs"></i>
          Amount <span class="text-red-500">*</span>
        </label>
        <p-inputNumber
          id="amount"
          [(ngModel)]="amountValue"
          mode="decimal"
          [minFractionDigits]="2"
          [maxFractionDigits]="4"
          placeholder="0.00"
          styleClass="w-full"
        />
      </div>
    </div>
    } @else {
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-4">
      <div>
        <label for="metal" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)] mb-1">
          <i class="pi pi-star-fill text-[var(--color-primary)] !text-xs"></i>
          Metal <span class="text-red-500">*</span>
        </label>
        <p-select
          id="metal"
          [options]="metalOptions"
          [ngModel]="metal()"
          optionLabel="label"
          optionValue="code"
          placeholder="Select metal"
          styleClass="w-full"
          (onChange)="metal.set($event.value)"
        >
          <ng-template let-option pTemplate="item">
            <span class="inline-flex items-center gap-2">
              <i [class]="option.icon"></i>
              {{ option.label }}
            </span>
          </ng-template>
          <ng-template let-option pTemplate="selectedItem">
            <span class="inline-flex items-center gap-2">
              <i [class]="option.icon"></i>
              {{ option.label }}
            </span>
          </ng-template>
        </p-select>
      </div>

      <div>
        <label for="purity" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)] mb-1">
          <i class="pi pi-percentage text-[var(--color-primary)] !text-xs"></i>
          Purity <span class="text-red-500">*</span>
        </label>
        <p-select
          id="purity"
          [options]="purityOptions()"
          [ngModel]="purityLabel()"
          optionLabel="label"
          optionValue="label"
          placeholder="Select purity"
          styleClass="w-full"
          [disabled]="!metal()"
          (onChange)="purityLabel.set($event.value)"
        />
      </div>
    </div>

    <div>
      <label for="grams" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)] mb-1">
        <i class="pi pi-database text-[var(--color-primary)] !text-xs"></i>
        Grams <span class="text-red-500">*</span>
      </label>
      <p-inputNumber
        id="grams"
        [(ngModel)]="gramsValue"
        mode="decimal"
        [minFractionDigits]="2"
        [maxFractionDigits]="4"
        placeholder="0.00"
        styleClass="w-full"
      />
    </div>
    }

    <div class="flex items-center justify-between">
      <label for="active" class="flex items-center gap-2 text-sm font-medium text-[var(--color-text-muted)]">
        <i class="pi pi-eye text-[var(--color-primary)] !text-xs"></i>
        Active
      </label>
      <p-toggleSwitch id="active" [(ngModel)]="activeValue" ariaLabel="Toggle entry active" />
    </div>

  <p-button
    [label]="editMode() ? 'Save' : 'Add Savings'"
    [icon]="editMode() ? 'pi pi-check' : 'pi pi-plus'"
    (onClick)="addEntry()"
    [disabled]="!canAdd()"
    styleClass="w-full"
  />
</div>
