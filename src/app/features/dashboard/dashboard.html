<div class="mx-auto grid grid-cols-1 w-full max-w-5xl gap-4 md:gap-6">
  <app-savings-total
    [total]="savingsStore.totalInBase()"
    [entryCount]="savingsStore.entryCount()"
    [baseCurrency]="exchangeStore.currentBase()"
  />

  <app-savings-list
    [entries]="savingsStore.allEntries()"
    [baseCurrency]="exchangeStore.currentBase()"
    [exchangeStore]="exchangeStore"
    (deleteEntry)="savingsStore.deleteEntry($event)"
    (editEntry)="onEditSavingsEntry($event)"
    (addEntry)="onAddSavingsClicked()"
    (toggleActive)="onToggleSavingsActive($event)"
    (reorder)="savingsStore.reorderEntries($event)"
  />

  <app-rate-list
    [rates]="exchangeStore.allRates()"
    (deleteRate)="onRateDeleted($event)"
    (editRate)="onEditRate($event)"
    (addRate)="onAddRateClicked()"
    (toggleActive)="onToggleRateActive($event)"
    (reorder)="exchangeStore.reorderRates($event)"
  />

  <app-api-rate-list
    [rates]="exchangeStore.apiRateRows()"
    [baseCurrency]="exchangeStore.currentBase()"
    [lastSyncedAt]="exchangeStore.lastSyncedAt()"
    [isSyncing]="exchangeStore.isSyncing()"
    [syncInterval]="exchangeStore.syncInterval()"
    (sync)="onSyncFromApi()"
  />
</div>

<!-- Edit Savings Dialog -->
<p-dialog
  [(visible)]="editSavingsDialogVisible"
  [modal]="true"
  header="Edit Savings Entry"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
>
  <app-savings-form
    #editSavingsForm
    [editMode]="true"
    [baseCurrency]="exchangeStore.currentBase()"
    (entryAdded)="onSaveSavingsEdit($event)"
  />
</p-dialog>

<!-- Edit Rate Dialog -->
<p-dialog
  [(visible)]="editRateDialogVisible"
  [modal]="true"
  header="Edit Exchange Rate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
>
  <app-rate-config
    #editRateForm
    [editMode]="true"
    [existingRates]="exchangeStore.allRates()"
    (rateAdded)="onSaveRateEdit($event)"
  />
</p-dialog>

<!-- Add Savings Dialog -->
<p-dialog
  [(visible)]="addSavingsDialogVisible"
  [modal]="true"
  header="Add Savings Entry"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
>
  <app-savings-form
    [baseCurrency]="exchangeStore.currentBase()"
    (entryAdded)="onSavingsAddedFromDialog($event)"
  />
</p-dialog>

<!-- Add Rate Dialog -->
<p-dialog
  [(visible)]="addRateDialogVisible"
  [modal]="true"
  header="Add Exchange Rate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
>
  <app-rate-config
    [existingRates]="exchangeStore.allRates()"
    (rateAdded)="onRateAddedFromDialog($event)"
  />
</p-dialog>
