<div class="mx-auto grid grid-cols-1 w-full max-w-5xl gap-4 md:gap-6">
  <app-savings-total
    [total]="savingsStore.totalInBase()"
    [entryCount]="savingsStore.entryCount()"
    [baseCurrency]="exchangeStore.currentBase()"
  />

  <app-savings-list
    [entries]="savingsStore.allEntries()"
    [baseCurrency]="exchangeStore.currentBase()"
    [exchangeStore]="exchangeStore"
    [metalStore]="metalStore"
    (deleteEntry)="savingsStore.deleteEntry($event)"
    (editEntry)="onEditSavingsEntry($event)"
    (addEntry)="onAddSavingsClicked()"
    (toggleActive)="onToggleSavingsActive($event)"
    (reorder)="savingsStore.reorderEntries($event)"
  />

  <app-rate-list
    [rates]="exchangeStore.allRates()"
    (deleteRate)="onRateDeleted($event)"
    (editRate)="onEditRate($event)"
    (addRate)="onAddRateClicked()"
    (toggleActive)="onToggleRateActive($event)"
    (reorder)="exchangeStore.reorderRates($event)"
  />

  <app-api-rate-list
    [rates]="exchangeStore.apiRateRows()"
    [baseCurrency]="exchangeStore.currentBase()"
    [lastSyncedAt]="exchangeStore.lastSyncedAt()"
    [isSyncing]="exchangeStore.isSyncing()"
    [syncInterval]="exchangeStore.syncInterval()"
    (sync)="onSyncFromApi()"
  />

  <app-metal-price-list
    [prices]="metalStore.allCustomPrices()"
    [baseCurrency]="exchangeStore.currentBase()"
    (deletePrice)="onMetalPriceDeleted($event)"
    (editPrice)="onEditMetalPrice($event)"
    (addPrice)="onAddMetalPriceClicked()"
    (toggleActive)="onToggleMetalPriceActive($event)"
    (reorder)="metalStore.reorderPrices($event)"
  />

  <app-api-metal-price-list
    [rows]="metalStore.apiMetalRows()"
    [baseCurrency]="exchangeStore.currentBase()"
    [lastSyncedAt]="metalStore.lastSyncedAt()"
    [isSyncing]="metalStore.isSyncing()"
    [syncInterval]="exchangeStore.syncInterval()"
    (sync)="onSyncMetalsFromApi()"
  />
</div>

<!-- Edit Savings Dialog -->
<p-dialog
  [(visible)]="editSavingsDialogVisible"
  [modal]="true"
  header="Edit Savings Entry"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('edit-savings', () => editSavingsDialogVisible.set(false))"
  (onHide)="overlayStack.release('edit-savings')"
>
  <app-savings-form
    #editSavingsForm
    [editMode]="true"
    [baseCurrency]="exchangeStore.currentBase()"
    (entryAdded)="onSaveSavingsEdit($event)"
  />
</p-dialog>

<!-- Edit Rate Dialog -->
<p-dialog
  [(visible)]="editRateDialogVisible"
  [modal]="true"
  header="Edit Exchange Rate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('edit-rate', () => editRateDialogVisible.set(false))"
  (onHide)="overlayStack.release('edit-rate')"
>
  <app-rate-config
    #editRateForm
    [editMode]="true"
    [existingRates]="exchangeStore.allRates()"
    (rateAdded)="onSaveRateEdit($event)"
  />
</p-dialog>

<!-- Edit Metal Price Dialog -->
<p-dialog
  [(visible)]="editMetalPriceDialogVisible"
  [modal]="true"
  header="Edit Metal Price"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('edit-metal-price', () => editMetalPriceDialogVisible.set(false))"
  (onHide)="overlayStack.release('edit-metal-price')"
>
  <app-metal-price-config
    #editMetalPriceForm
    [editMode]="true"
    [baseCurrency]="exchangeStore.currentBase()"
    (priceAdded)="onSaveMetalPriceEdit($event)"
  />
</p-dialog>

<!-- Add Savings Dialog -->
<p-dialog
  [(visible)]="addSavingsDialogVisible"
  [modal]="true"
  header="Add Savings Entry"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('add-savings', () => addSavingsDialogVisible.set(false))"
  (onHide)="overlayStack.release('add-savings')"
>
  <app-savings-form
    [baseCurrency]="exchangeStore.currentBase()"
    (entryAdded)="onSavingsAddedFromDialog($event)"
  />
</p-dialog>

<!-- Add Rate Dialog -->
<p-dialog
  [(visible)]="addRateDialogVisible"
  [modal]="true"
  header="Add Exchange Rate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('add-rate', () => addRateDialogVisible.set(false))"
  (onHide)="overlayStack.release('add-rate')"
>
  <app-rate-config
    [existingRates]="exchangeStore.allRates()"
    (rateAdded)="onRateAddedFromDialog($event)"
  />
</p-dialog>

<!-- Add Metal Price Dialog -->
<p-dialog
  [(visible)]="addMetalPriceDialogVisible"
  [modal]="true"
  header="Add Metal Price"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('add-metal-price', () => addMetalPriceDialogVisible.set(false))"
  (onHide)="overlayStack.release('add-metal-price')"
>
  <app-metal-price-config
    [baseCurrency]="exchangeStore.currentBase()"
    (priceAdded)="onMetalPriceAddedFromDialog($event)"
  />
</p-dialog>
