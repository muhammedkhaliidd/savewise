<div class="mx-auto grid grid-cols-1 w-full max-w-5xl gap-4 md:gap-6">
  <app-rate-list
    [rates]="exchangeStore.allRates()"
    (deleteRate)="onRateDeleted($event)"
    (editRate)="onEditRate($event)"
    (addRate)="onAddRateClicked()"
    (toggleActive)="onToggleRateActive($event)"
    (reorder)="exchangeStore.reorderRates($event)"
  />

  <!-- separator -->
  <div class="h-px w-full bg-[var(--color-border)]"></div>

  <app-metal-price-list
    [prices]="metalStore.allCustomPrices()"
    [baseCurrency]="exchangeStore.currentBase()"
    (deletePrice)="onMetalPriceDeleted($event)"
    (editPrice)="onEditMetalPrice($event)"
    (addPrice)="onAddMetalPriceClicked()"
    (toggleActive)="onToggleMetalPriceActive($event)"
    (reorder)="metalStore.reorderPrices($event)"
  />
</div>

<!-- Edit Rate Dialog -->
<p-dialog
  [(visible)]="editRateDialogVisible"
  [modal]="true"
  [header]="'dashboard.editRate' | translate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('edit-rate', () => editRateDialogVisible.set(false))"
  (onHide)="overlayStack.release('edit-rate')"
>
  <app-rate-config
    #editRateForm
    [editMode]="true"
    [existingRates]="exchangeStore.allRates()"
    (rateAdded)="onSaveRateEdit($event)"
  />
</p-dialog>

<!-- Edit Metal Price Dialog -->
<p-dialog
  [(visible)]="editMetalPriceDialogVisible"
  [modal]="true"
  [header]="'dashboard.editMetalPrice' | translate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('edit-metal-price', () => editMetalPriceDialogVisible.set(false))"
  (onHide)="overlayStack.release('edit-metal-price')"
>
  <app-metal-price-config
    #editMetalPriceForm
    [editMode]="true"
    [baseCurrency]="exchangeStore.currentBase()"
    (priceAdded)="onSaveMetalPriceEdit($event)"
  />
</p-dialog>

<!-- Add Rate Dialog -->
<p-dialog
  [(visible)]="addRateDialogVisible"
  [modal]="true"
  [header]="'dashboard.addRate' | translate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('add-rate', () => addRateDialogVisible.set(false))"
  (onHide)="overlayStack.release('add-rate')"
>
  <app-rate-config
    [existingRates]="exchangeStore.allRates()"
    (rateAdded)="onRateAddedFromDialog($event)"
  />
</p-dialog>

<!-- Add Metal Price Dialog -->
<p-dialog
  [(visible)]="addMetalPriceDialogVisible"
  [modal]="true"
  [header]="'dashboard.addMetalPrice' | translate"
  [style]="{ width: '90vw', maxWidth: '30rem' }"
  (onShow)="overlayStack.register('add-metal-price', () => addMetalPriceDialogVisible.set(false))"
  (onHide)="overlayStack.release('add-metal-price')"
>
  <app-metal-price-config
    [baseCurrency]="exchangeStore.currentBase()"
    (priceAdded)="onMetalPriceAddedFromDialog($event)"
  />
</p-dialog>
